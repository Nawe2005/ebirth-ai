name: Generate daily draft

on:
  schedule:
    # 01:30 UTC = 07:00 Sri Lanka time (UTC+5:30). Adjust if you like.
    - cron: "30 1 * * *"
  workflow_dispatch:        # lets you also run it by hand for testing

permissions:
  contents: write           # needed to commit the draft back to the repo

jobs:
  draft:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Generate draft
        run: python generate_draft.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DISCORD_DRAFT_WEBHOOK: ${{ secrets.DISCORD_DRAFT_WEBHOOK }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}

      - name: Commit draft
        run: |
          git config user.name "eBirth Bot"
          git config user.email "bot@ebirth.local"
          git add drafts/
          if git diff --cached --quiet; then
            echo "Nothing to commit"
            exit 0
          fi
          git commit -m "Draft $(date +%F)"
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main
